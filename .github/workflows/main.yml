name: Update OTTclub Key (API Requests)

on:
  schedule:
    - cron: '0 5 */2 * *'
  workflow_dispatch:

jobs:
  run-api-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run OTTclub API script
        run: python -u vip_ottclub.py
